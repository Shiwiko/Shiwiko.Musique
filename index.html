<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <style>
        :root { 
            --neon: #00f2ff; --purple: #bc13fe; --gold: #f1c40f; --crit: #ff3131; --online: #2ecc71; --dev: #ff00ea; 
            --b-ytb: #ff0000; --b-stm: #a970ff; --b-pub: #00ffcc; --b-give: #00d4ff; --b-friend: #2ecc71; --b-owner: #ff3131;
        }
        body { background: #090a0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; user-select: none; }
        .box { width: 360px; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; margin: 20px; }
        #u-name { margin-bottom: 20px; padding: 12px 85px 12px 12px; background: rgba(0,0,0,0.4); border-radius: 12px; border-left: 3px solid var(--neon); text-align: left; min-height: 24px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; font-size: 12px; }
        .trophy-btn { position: absolute; top: 32px; right: 30px; background: rgba(0,0,0,0.7); border: 1px solid var(--gold); color: var(--gold); padding: 6px 10px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; z-index: 50; }
        .big-score { font-size: 45px; font-weight: 900; text-shadow: 0 0 20px var(--neon); margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .pixel-cookie { width: 150px; height: 150px; filter: drop-shadow(0 0 15px var(--neon)); cursor: pointer; transition: transform 0.05s; outline: none; -webkit-tap-highlight-color: transparent; }
        .pixel-cookie:active { transform: scale(1.15); }
        .click-float { position: absolute; font-weight: 900; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 100; font-size: 22px; text-shadow: 0 0 8px rgba(0,0,0,0.8); }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-130px) scale(1.2); opacity: 0; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { width: 330px; background: #0f111a; border: 2px solid var(--purple); border-radius: 25px; padding: 25px; text-align: center; position: relative; max-height: 80vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: white; }
        .btn { background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; border: none; padding: 12px; border-radius: 15px; cursor: pointer; width: 100%; margin: 5px 0; font-weight: bold; }
        .shop { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 18px; margin-top: 10px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; text-transform: uppercase; }
        .admin-btn { background: #ff3131; color: white; font-size: 11px; padding: 10px; border-radius: 10px; border: 1px solid white; margin-top: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .link-sub { color: #888; font-size: 10px; cursor: pointer; text-decoration: underline; margin-top: 10px; display: block; }
        .gift-count { color: var(--gold); font-weight: bold; }
        .dev-tag { color: var(--dev); font-weight: bold; } .is-dev { color: var(--gold) !important; font-weight: bold !important; }
        .daily-btn { background: linear-gradient(45deg, var(--gold), #d4af37); color: black; border: none; padding: 14px; border-radius: 15px; cursor: pointer; width: 100%; margin: 15px 0 5px 0; font-weight: 900; }
        .save-load-container { display: flex; gap: 8px; margin-top: 5px; }
        .small-btn { flex: 1; font-size: 11px; padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="box">
    <div id="login-ui">
        <h2 style="color:var(--neon)">COOKIE GAME</h2>
        <input type="text" id="user" placeholder="Pseudo">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button class="btn" onclick="login()">CONNEXION / REJOINDRE</button>
        <span class="link-sub" onclick="handleForgotPassword()">MOT DE PASSE OUBLIÉ ?</span>
    </div>

    <div id="game-ui" style="display:none">
        <button class="trophy-btn" onclick="toggleLeaderboard()">🏆 TOP</button>
        <div id="u-name"><span id="player-profile-render"></span></div>
        <div class="big-score" id="score">0 🍪</div>
        <div class="cookie-container" id="cookie-area" style="position:relative;">
            <img src="https://i.postimg.cc/SKB3hNDg/cookie-9181659-1280.png" class="pixel-cookie" onclick="handleClick()">
        </div>
        
        <button id="daily-btn" class="daily-btn" onclick="claimDaily()">🎁 CADEAU QUOTIDIEN</button>
        
        <div class="save-load-container">
            <button class="small-btn" style="background: #444;" onclick="exportSave()">💾 SAUVEGARDER</button>
            <button class="small-btn" style="background: var(--online);" onclick="importSave()">📥 CHARGER</button>
        </div>

        <div class="shop"><span><b>FORCE (x<span id="m-lvl">1</span>)</b></span><button class="btn" style="width:110px" onclick="buy('m')">UP (<span id="m-cost">10</span>)</button></div>
        <div class="shop"><span><b>AUTO (<span id="a-lvl">0</span>/s)</b></span><button class="btn" style="width:110px" onclick="buy('a')">BUY (<span id="a-cost">50</span>)</button></div>
        
        <button id="admin-panel" class="admin-btn" style="display:none;" onclick="adminAction()">⚙️ PANEL ADMIN</button>
        <span class="link-sub" onclick="location.reload()">🚪 DÉCONNEXION</span>
    </div>
</div>

<div id="leader-modal" class="modal">
    <div class="modal-content"><span class="close-btn" onclick="toggleLeaderboard()">×</span><h2 style="color:var(--gold)">CLASSEMENT</h2><div id="leaderboard-list"></div></div>
</div>

<script>
    let player = { n: "", pw: "", s: 0, m: 1, a: 0, lastDaily: 0, badgeTitle: "", titleType: "", banned: false, gifts: 0, recovery: "", recoveryActive: false };
    const VERSION = "cyber_v46_0_"; 
    const icons = {"ytb":"🎥","stm":"📡","pub":"📢","giveaway":"🎉","friend":"🤝","owner":"👑"};
    const MASTER = "SHIWIKOO_O"; 

    function formatNum(num) {
        if (num < 1000) return Math.floor(num);
        const units = ["k", "M", "B", "T"];
        let i = -1; do { num /= 1000; i++; } while (num >= 1000 && i < 3);
        return num.toFixed(1).replace(/\.0$/, '') + units[i];
    }

    function parseKMBT(str) {
        const match = str.toString().trim().match(/^([0-9.]+)([kmbt]?)$/i);
        if (!match) return parseFloat(str) || 0;
        const mult = { k: 1e3, m: 1e6, b: 1e9, t: 1e12 };
        return parseFloat(match[1]) * (mult[match[2].toLowerCase()] || 1);
    }
    
    function getCostM() { return Math.round(10 * Math.pow(1.15, player.m - 1)); }
    function getCostA() { return Math.round(50 * Math.pow(1.20, player.a)); }

    function save() { localStorage.setItem(VERSION + player.n, JSON.stringify(player)); }

    function login() {
        let u = document.getElementById('user').value.trim().toUpperCase();
        let pw = document.getElementById('pass').value.trim().toUpperCase();
        if(!u || !pw) return alert("Remplis tout !");
        let saved = localStorage.getItem(VERSION + u);
        if(saved) {
            let data = JSON.parse(saved);
            if(data.pw !== pw) return alert("Mot de passe incorrect");
            if(data.banned) return alert("BANNI !");
            player = data;
        } else { player.n = u; player.pw = pw; save(); }
        start();
    }

    function handleForgotPassword() {
        let choix = prompt("1: CRÉER UNE DEMANDE | 2: UTILISER UN CODE VALIDÉ");
        if(choix === "1") {
            let u = prompt("PSEUDO DU COMPTE :").toUpperCase().trim();
            let saved = localStorage.getItem(VERSION + u);
            if(!saved) return alert("Compte inconnu sur cet appareil.");
            let data = JSON.parse(saved);
            let code = "REQ-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            data.recovery = code;
            data.recoveryActive = false; 
            localStorage.setItem(VERSION + u, JSON.stringify(data));
            prompt("DONNE CE CODE À SHIWIKO POUR VALIDATION :", code);
        } else if(choix === "2") {
            let codeUser = prompt("ENTRE TON CODE RÉCUPÉRATION :").toUpperCase().trim();
            let trouve = false;
            for(let i=0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith(VERSION)) {
                    let data = JSON.parse(localStorage.getItem(key));
                    if(data.recovery === codeUser) {
                        if(!data.recoveryActive) return alert("Ce code n'est pas encore validé par l'admin !");
                        trouve = true;
                        let newPw = prompt("CODE VALIDÉ ! NOUVEAU MDP :").toUpperCase().trim();
                        if(newPw) {
                            data.pw = newPw;
                            data.recovery = ""; data.recoveryActive = false;
                            localStorage.setItem(key, JSON.stringify(data));
                            alert("Mot de passe mis à jour !");
                        }
                        break;
                    }
                }
            }
            if(!trouve) alert("Code invalide.");
        }
    }

    function exportSave() {
        let code = "SHI-" + btoa(JSON.stringify(player));
        prompt("COPIE TON CODE DE SAUVEGARDE (À CONSERVER) :", code);
    }

    function importSave() {
        let code = prompt("COLLE TON CODE DE SAUVEGARDE :");
        if(!code) return;
        try {
            let data = JSON.parse(atob(code.replace("SHI-", "")));
            player = data; save(); updateUI(); alert("Sauvegarde chargée !");
        } catch(e) { alert("Code invalide."); }
    }

    function start() {
        document.getElementById('login-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        if(player.n === MASTER) document.getElementById('admin-panel').style.display = 'block';
        setInterval(() => { 
            if(player.a > 0){ player.s += player.a; spawnText(player.a, "var(--purple)", true); } 
            updateUI(); updateDailyTimer(); save(); 
        }, 1000);
        updateLeaderboard();
    }

    function handleClick() { 
        player.s += player.m; 
        spawnText(player.m, "var(--neon)", false);
        updateUI(); save(); 
    }

    function spawnText(val, color, isAuto) {
        const area = document.getElementById('cookie-area');
        const text = document.createElement('div');
        text.className = 'click-float';
        text.style.color = color;
        text.innerText = "+" + formatNum(val);
        if(isAuto) { text.style.left = "40%"; text.style.top = "30%"; } 
        else { text.style.left = (Math.random() * 60 + 20) + "%"; text.style.top = "40%"; }
        area.appendChild(text);
        setTimeout(() => text.remove(), 800);
    }

    function buy(type) {
        if(type === 'm' && player.s >= getCostM()) { player.s -= getCostM(); player.m++; }
        if(type === 'a' && player.s >= getCostA()) { player.s -= getCostA(); player.a++; }
        updateUI(); save();
    }

    function updateUI() {
        document.getElementById('score').innerText = formatNum(player.s) + " 🍪";
        document.getElementById('m-lvl').innerText = formatNum(player.m);
        document.getElementById('a-lvl').innerText = formatNum(player.a);
        document.getElementById('m-cost').innerText = formatNum(getCostM());
        document.getElementById('a-cost').innerText = formatNum(getCostA());
        document.getElementById('player-profile-render').innerHTML = generateTagHTML(player);
    }

    function generateTagHTML(p) {
        let dev = (p.n === MASTER) ? `<span class="dev-tag">[DEV]</span>` : "";
        let bSpan = p.badgeTitle ? `<span class="tag-${p.badgeTitle}">[${icons[p.badgeTitle]}]</span>` : "";
        let gSpan = p.gifts > 0 ? `<span class="gift-count">[🎁${p.gifts}]</span>` : "";
        return `<span class="${p.n === MASTER ?'is-dev':''}">${p.n}</span>${dev}${bSpan}${gSpan}`;
    }

    function updateLeaderboard() {
        let all = [];
        for(let i=0; i<localStorage.length; i++) {
            if(localStorage.key(i).startsWith(VERSION)) all.push(JSON.parse(localStorage.getItem(localStorage.key(i))));
        }
        all.sort((a,b) => b.s - a.s);
        document.getElementById('leaderboard-list').innerHTML = all.slice(0,20).map((p, i) => 
            `<div style="margin:5px 0; display:flex; justify-content:space-between;"><span>#${i+1} ${generateTagHTML(p)}</span><b>${formatNum(p.s)}</b></div>`
        ).join('');
    }

    function toggleLeaderboard() {
        const modal = document.getElementById('leader-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        if(modal.style.display === 'flex') updateLeaderboard();
    }

    function adminAction() {
        let action = prompt("1:GIFT | 2:RESET | 3:STATS | 4:TITRE | 5:BAN | 8:TOP 20 | 9:VALIDER UN CODE | 0:QUIT");
        if(action === "8") {
            let all = [];
            for(let i=0; i < localStorage.length; i++) {
                if(localStorage.key(i).startsWith(VERSION)) all.push(JSON.parse(localStorage.getItem(localStorage.key(i))));
            }
            all.sort((a,b) => b.s - a.s);
            alert("--- TOP 20 ---\n" + all.slice(0,20).map((p, i) => `${i+1}. ${p.n} : ${formatNum(p.s)}`).join("\n"));
            return;
        }
        if(action === "9") {
            let codeAValider = prompt("ENTRE LE CODE REQ DU JOUEUR :").toUpperCase().trim();
            let trouveAdmin = false;
            for(let i=0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith(VERSION)) {
                    let d = JSON.parse(localStorage.getItem(key));
                    if(d.recovery === codeAValider) {
                        d.recoveryActive = true;
                        localStorage.setItem(key, JSON.stringify(d));
                        alert("CODE VALIDÉ POUR " + d.n + " !");
                        trouveAdmin = true; break;
                    }
                }
            }
            if(!trouveAdmin) alert("Code non trouvé.");
            return;
        }
        if(!action || action === "0") return;

        let cible = prompt("PSEUDO DU JOUEUR :").toUpperCase().trim();
        let data = JSON.parse(localStorage.getItem(VERSION + cible));
        if(!data) return alert("❌ Inconnu");

        switch(action) {
            case "1": data.s += parseKMBT(prompt("Cookies ?")); data.gifts = (data.gifts || 0) + 1; break;
            case "2": data.s = 0; data.gifts = 0; break;
            case "3": data.m = parseInt(prompt("Force ?", data.m)); data.a = parseInt(prompt("Auto ?", data.a)); break;
            case "4": data.badgeTitle = prompt("Badge (ytb, stm, pub, giveaway, friend, owner)"); break;
            case "5": data.banned = !data.banned; break;
        }
        localStorage.setItem(VERSION + cible, JSON.stringify(data));
        if(cible === player.n) { player = data; updateUI(); }
        updateLeaderboard();
    }

    function claimDaily() {
        if(Date.now() - player.lastDaily >= 86400000) {
            let r = 5000 * player.m; player.s += r; player.lastDaily = Date.now();
            spawnText(r, "var(--gold)", false); updateUI(); save();
        }
    }

    function updateDailyTimer() {
        let btn = document.getElementById('daily-btn');
        let remain = 86400000 - (Date.now() - player.lastDaily);
        if(remain > 0) {
            let h = Math.floor(remain/3600000); let m = Math.floor((remain%3600000)/60000);
            btn.innerText = `${h}H ${m}M RESTANT`; btn.disabled = true;
        } else { btn.innerText = "🎁 CADEAU QUOTIDIEN"; btn.disabled = false; }
    }
</script>
</body>

        all.sort((a,b) => b.s - a.s);
        document.getElementById('leaderboard-list').innerHTML = all.slice(0,20).map((p, i) => 
            `<div style="margin:5px 0; display:flex; justify-content:space-between;"><span>#${i+1} ${generateTagHTML(p)}</span><b>${formatNum(p.s)}</b></div>`
        ).join('');
    }

    function toggleLeaderboard() {
        const modal = document.getElementById('leader-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        if(modal.style.display === 'flex') updateLeaderboard();
    }

    function adminAction() {
        let action = prompt("1:GIFT | 2:RESET | 3:STATS | 4:TITRE | 5:BAN | 6:EXPORT | 7:GEN CODE RÉCUP | 8:VOIR TOP 20 | 0:QUIT");
        if(action === "8") {
            let all = [];
            for(let i=0; i < localStorage.length; i++) {
                if(localStorage.key(i).startsWith(VERSION)) all.push(JSON.parse(localStorage.getItem(localStorage.key(i))));
            }
            all.sort((a,b) => b.s - a.s);
            alert("--- TOP 20 ---\n" + all.slice(0,20).map((p, i) => `${i+1}. ${p.n} : ${formatNum(p.s)}`).join("\n"));
            return;
        }
        if(!action || action === "0") return;

        let cible = prompt("PSEUDO DU JOUEUR :").toUpperCase().trim();
        let data = JSON.parse(localStorage.getItem(VERSION + cible));
        if(!data) return alert("❌ Joueur introuvable");

        switch(action) {
            case "1": data.s += parseKMBT(prompt("Ajouter cookies ?")); data.gifts = (data.gifts || 0) + 1; break;
            case "2": data.s = 0; data.gifts = 0; break;
            case "3": data.m = parseInt(prompt("Force ?", data.m)); data.a = parseInt(prompt("Auto ?", data.a)); break;
            case "4": data.badgeTitle = prompt("Badge (ytb, stm, pub, giveaway, friend, owner)"); break;
            case "5": data.banned = !data.banned; break;
            case "6": prompt("CODE:", "SHI-" + btoa(JSON.stringify(data))); break;
            case "7": 
                let codeGen = Math.random().toString(36).substring(2, 8).toUpperCase();
                data.recovery = codeGen;
                prompt("CODE RÉCUPÉRATION :", codeGen);
                break;
        }
        localStorage.setItem(VERSION + cible, JSON.stringify(data));
        if(cible === player.n) { player = data; updateUI(); }
        updateLeaderboard();
    }

    function importSave() {
        let code = prompt("COLLE TON CODE :");
        if(!code) return;
        try {
            let data = JSON.parse(atob(code.replace("SHI-", "")));
            if(player.n !== "" && data.n !== player.n) return alert("Code appartient à " + data.n);
            player = data; save(); updateUI(); alert("Chargé !");
        } catch(e) { alert("Code invalide."); }
    }

    function claimDaily() {
        if(Date.now() - player.lastDaily >= 86400000) {
            let r = 5000 * player.m; player.s += r; player.lastDaily = Date.now();
            spawnText(r, "var(--gold)", false); updateUI(); save();
        }
    }

    function updateDailyTimer() {
        let btn = document.getElementById('daily-btn');
        let remain = 86400000 - (Date.now() - player.lastDaily);
        if(remain > 0) {
            let h = Math.floor(remain/3600000); let m = Math.floor((remain%3600000)/60000);
            btn.innerText = `${h}H ${m}M RESTANT`; btn.disabled = true;
        } else { btn.innerText = "🎁 CADEAU QUOTIDIEN"; btn.disabled = false; }
    }
</script>
</body>
</html>
